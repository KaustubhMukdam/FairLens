version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    volumes:
      - ./backend:/app
    environment:
      - GOOGLE_CLOUD_PROJECT=your-project-id
      - GCS_BUCKET_NAME=fairlens-uploads
      - FIRESTORE_COLLECTION=audits
      - VERTEX_AI_LOCATION=us-central1
      - GEMINI_MODEL=gemini-1.5-pro
      - BACKEND_CORS_ORIGINS=["http://localhost:5173","https://fairlens.vercel.app"]
      - MAX_UPLOAD_SIZE_MB=50
